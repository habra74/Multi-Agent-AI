# =============================================================
# Nginx 설정 — dashboard.glowbuff.com
# =============================================================
#
# 배포 위치: /etc/nginx/sites-available/dashboard.glowbuff.com
# 활성화:    ln -s /etc/nginx/sites-available/dashboard.glowbuff.com \
#                   /etc/nginx/sites-enabled/
#
# 전제 조건:
#   - Streamlit 컨테이너가 localhost:8501 에서 실행 중
#   - certbot으로 SSL 인증서 발급 완료
#   - /etc/letsencrypt/live/dashboard.glowbuff.com/ 디렉터리 존재
#
# 처리 흐름:
#   클라이언트 → HTTPS:443 → Nginx → HTTP localhost:8501 (컨테이너)
#   클라이언트 → HTTP:80   → Nginx → 301 Redirect → HTTPS:443
# =============================================================


# ─────────────────────────────────────────────
# 업스트림 정의 (Streamlit 컨테이너)
# ─────────────────────────────────────────────
upstream streamlit_app {
    server 127.0.0.1:8501;
    keepalive 32;
}


# ─────────────────────────────────────────────
# HTTP → HTTPS 리다이렉트
# ─────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name dashboard.glowbuff.com;

    # Let's Encrypt ACME 챌린지 (certbot 갱신 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청 → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}


# ─────────────────────────────────────────────
# HTTPS 본문
# ─────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name dashboard.glowbuff.com;

    # ── SSL 인증서 (Let's Encrypt) ────────────
    ssl_certificate     /etc/letsencrypt/live/dashboard.glowbuff.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.glowbuff.com/privkey.pem;

    # certbot 권장 SSL 옵션 (최신 암호화 스위트)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL 세션 캐시 (성능 최적화) ───────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 보안 헤더 ────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "no-referrer-when-downgrade"          always;

    # ── 요청 크기 제한 ────────────────────────
    client_max_body_size 50m;

    # ── 접근 로그 ────────────────────────────
    access_log /var/log/nginx/dashboard.glowbuff.com.access.log;
    error_log  /var/log/nginx/dashboard.glowbuff.com.error.log warn;


    # ─────────────────────────────────────────
    # Streamlit 메인 프록시
    # ─────────────────────────────────────────
    location / {
        proxy_pass         http://streamlit_app;
        proxy_http_version 1.1;

        # ── WebSocket 지원 (Streamlit 필수) ──
        # Streamlit은 WebSocket으로 실시간 통신하므로
        # Upgrade / Connection 헤더를 반드시 전달해야 함
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ── 헤더 전달 ─────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ── 타임아웃 설정 ─────────────────────
        # 분석 실행이 수 분 걸릴 수 있으므로 넉넉하게 설정
        proxy_connect_timeout  10s;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;

        # ── 버퍼 설정 ─────────────────────────
        proxy_buffering    off;   # Streamlit streaming 응답 대응
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }


    # ─────────────────────────────────────────
    # Streamlit 정적 파일 캐시
    # ─────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|map)$ {
        proxy_pass         http://streamlit_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        expires    7d;
        add_header Cache-Control "public, no-transform";

        # WebSocket 헤더는 정적 파일에서 불필요하지만 무해함
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    # ─────────────────────────────────────────
    # Streamlit healthcheck 엔드포인트
    # ─────────────────────────────────────────
    location /_stcore/health {
        proxy_pass         http://streamlit_app/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;   # 헬스체크 로그 억제
    }


    # ─────────────────────────────────────────
    # 403/404/50x 에러 페이지 (선택)
    # ─────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
